<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataVerse Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-ok {
            background: #2ecc71;
        }
        
        .status-error {
            background: #e74c3c;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input[type="file"],
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ecf0f1;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input[type="file"]:focus,
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        .info-box {
            background: #ecf0f1;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            font-size: 0.95em;
        }
        
        .success {
            background: #d4edda;
            border-left-color: #2ecc71;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            border-left-color: #e74c3c;
            color: #721c24;
        }
        
        .warning {
            background: #fff3cd;
            border-left-color: #f39c12;
            color: #856404;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results-section {
            margin-top: 20px;
            display: none;
        }
        
        .results-section.visible {
            display: block;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .result-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .result-content {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }
        
        .json-display {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .query-templates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .template-btn {
            background: #f0f0f0;
            color: #667eea;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .template-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }
        
        .history-time {
            color: #999;
            font-size: 0.8em;
        }
        
        .dataset-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 DataVerse Analytics</h1>
            <p>AI-Powered Analytics for Retail & Product Datasets</p>
        </div>
        
        <div class="main-content">
            <!-- Left Panel: Upload -->
            <div class="card">
                <h2>📤 Upload Dataset</h2>
                <div id="connection-status">
                    <span class="status-indicator status-error"></span>
                    <span id="status-text">Checking connection...</span>
                </div>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>Select CSV File</label>
                    <input type="file" id="csvFile" accept=".csv" />
                </div>
                
                <div id="file-preview" style="display: none; margin: 15px 0;">
                    <div class="result-item">
                        <div class="result-title">File Preview</div>
                        <div id="preview-content" class="result-content"></div>
                    </div>
                </div>
                
                <button onclick="uploadDataset()">
                    <span class="spinner" id="upload-spinner" style="display: none;"></span>
                    Upload to Backend
                </button>
                
                <div id="upload-result" style="margin-top: 15px;"></div>
            </div>
            
            <!-- Right Panel: Query -->
            <div class="card">
                <h2>🔍 Query Dataset</h2>
                
                <div id="session-info" style="display: none; margin-bottom: 15px;" class="info-box">
                    <strong>Session:</strong> <span id="session-id">N/A</span>
                </div>
                
                <div id="query-disabled" class="warning">
                    Please upload a dataset first
                </div>
                
                <div id="query-form" style="display: none;">
                    <div style="margin-bottom: 15px;">
                        <strong style="color: #667eea;">Quick Templates:</strong>
                        <div class="query-templates">
                            <button class="template-btn" onclick="useTemplate('Analyze total sales by region')">Analyze by Region</button>
                            <button class="template-btn" onclick="useTemplate('What are the top 10 products?')">Top Products</button>
                            <button class="template-btn" onclick="useTemplate('Show profitability analysis')">Profitability</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Your Question</label>
                        <textarea id="queryText" placeholder="E.g., What are my best-selling products by region?"></textarea>
                    </div>
                    
                    <button onclick="sendQuery()">
                        <span class="spinner" id="query-spinner" style="display: none;"></span>
                        Analyze
                    </button>
                    <div class="button-group" style="margin-top: 10px;">
                        <button onclick="fetchDatasetProfile()">Dataset Profile</button>
                        <button onclick="fetchCorrelation()">Correlation Analysis</button>
                        <button onclick="fetchRecommendations()">DS Recommendations</button>
                    </div>
                    <div class="form-group" style="margin-top: 10px;">                        
                        <label for="trainTarget">Train Model (AutoML)</label>
                        <input type="text" id="trainTarget" placeholder="Target column name" />
                        <select id="trainTaskType" style="margin-top: 8px;"> 
                            <option value="classification">Classification</option>
                            <option value="regression">Regression</option>
                        </select>
                        <button onclick="trainModel()" style="margin-top: 8px;">Run AutoML</button>
                    </div>
                </div>
            </div>
            
            <!-- Full Width: Results -->
            <div class="card full-width">
                <h2>📈 Results</h2>
                <div id="results-container"></div>
            </div>
            
            <!-- Full Width: History -->
            <div class="card full-width">
                <h2>📝 Query History</h2>
                <div id="history-container" class="history-list">
                    <div style="color: #999; text-align: center; padding: 20px;">
                        No queries yet
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://localhost:8001/api";
        let sessionId = null;
        let queryHistory = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            document.getElementById('csvFile').addEventListener('change', previewFile);
        });
        
        // Check backend connection
        async function checkConnection() {
            try {
                const response = await fetch(`${BACKEND_URL}/health`, { mode: 'cors' });
                if (response.ok) {
                    document.querySelector('#status-text').textContent = '✓ Connected';
                    document.querySelector('.status-indicator').classList.remove('status-error');
                    document.querySelector('.status-indicator').classList.add('status-ok');
                } else {
                    setConnectionError('Backend error');
                }
            } catch (error) {
                setConnectionError('Cannot reach backend');
            }
        }
        
        function setConnectionError(msg) {
            document.querySelector('#status-text').textContent = '✗ ' + msg;
            document.querySelector('.status-indicator').classList.add('status-error');
            showMessage('upload-result', 'error', 'Backend not connected. Start server on port 8001.');
        }
        
        // File preview
        function previewFile() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                const headers = lines[0].split(',');
                let preview = `<strong>${file.name}</strong><br>`;
                preview += `Rows: ${lines.length - 1}, Columns: ${headers.length}<br><br>`;
                preview += '<small><strong>Columns:</strong> ' + headers.join(', ') + '</small>';
                
                document.getElementById('preview-content').innerHTML = preview;
                document.getElementById('file-preview').style.display = 'block';
            };
            reader.readAsText(file);
        }
        
        // Upload dataset
        async function uploadDataset() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) {
                showMessage('upload-result', 'error', 'Please select a file');
                return;
            }
            
            toggleSpinner('upload-spinner', true);
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${BACKEND_URL}/upload`, {
                    method: 'POST',
                    body: formData,
                    mode: 'cors'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    sessionId = data.session_id;
                    
                    document.getElementById('session-id').textContent = sessionId.substring(0, 12) + '...';
                    document.getElementById('session-info').style.display = 'block';
                    document.getElementById('query-disabled').style.display = 'none';
                    document.getElementById('query-form').style.display = 'block';
                    
                    const retailStatus = data.is_retail ? '✓ Retail Dataset' : '⚠️ Non-Retail';
                    let msg = `✓ Upload successful!<br>${retailStatus}<br>Message: ${data.message}`;
                    if (data.matched_keywords && data.matched_keywords.length > 0) {
                        msg += `<br>Keywords: ${data.matched_keywords.join(', ')}`;
                    }
                    showMessage('upload-result', 'success', msg);
                } else {
                    showMessage('upload-result', 'error', 'Upload failed: ' + response.statusText);
                }
            } catch (error) {
                showMessage('upload-result', 'error', 'Error: ' + error.message);
            } finally {
                toggleSpinner('upload-spinner', false);
            }
        }
        
        // Use template query
        function useTemplate(query) {
            document.getElementById('queryText').value = query;
            document.getElementById('queryText').focus();
        }
        
        // Send query
        async function sendQuery() {
            if (!sessionId) {
                showMessage('results-container', 'error', 'Please upload a dataset first');
                return;
            }
            
            const query = document.getElementById('queryText').value.trim();
            if (!query) {
                showMessage('results-container', 'error', 'Please enter a question');
                return;
            }
            
            toggleSpinner('query-spinner', true);
            
            try {
                const response = await fetch(`${BACKEND_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, query: query }),
                    mode: 'cors'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayResults(data, query);
                    
                    // Add to history
                    queryHistory.unshift({
                        timestamp: new Date().toLocaleTimeString(),
                        query: query,
                        is_retail: data.is_retail
                    });
                    updateHistory();
                } else {
                    showMessage('results-container', 'error', 'Query failed: ' + response.statusText);
                }
            } catch (error) {
                showMessage('results-container', 'error', 'Error: ' + error.message);
            } finally {
                toggleSpinner('query-spinner', false);
            }
        }
        
        // Display results
        function displayResults(data, originalQuery) {
            let html = '';
            
            // Original query
            html += `<div class="result-item">
                <div class="result-title">📝 Your Query</div>
                <div class="result-content">${originalQuery}</div>
            </div>`;
            
            // Detected intent
            if (data.intent) {
                html += `<div class="result-item">
                    <div class="result-title">🧠 Detected Intent</div>
                    <div class="json-display">${JSON.stringify(data.intent, null, 2)}</div>
                </div>`;
            }
            
            // Analysis report
            if (data.report) {
                let reportContent = data.report;
                if (typeof reportContent === 'string') {
                    try {
                        const reportJson = JSON.parse(reportContent);
                        reportContent = reportJson.narrative || JSON.stringify(reportJson, null, 2);
                    } catch (e) {
                        // Keep as string
                    }
                }
                
                html += `<div class="result-item">
                    <div class="result-title">📊 Analysis Report</div>
                    <div class="result-content">${reportContent}</div>
                </div>`;
            }
            
            // Computed facts
            if (data.computed_facts && Object.keys(data.computed_facts).length > 0) {
                html += `<div class="result-item">
                    <div class="result-title">🔍 Key Facts</div>
                    <div class="json-display">${JSON.stringify(data.computed_facts, null, 2)}</div>
                </div>`;
            }
            
            // Metadata
            html += `<div class="result-item">
                <div class="result-title">ℹ️ Metadata</div>
                <div class="result-content">
                    <strong>Is Retail Dataset:</strong> ${data.is_retail ? 'Yes' : 'No'}<br>
                    <strong>Action Required:</strong> ${data.action_required || 'None'}<br>
                    <strong>Timestamp:</strong> ${new Date().toLocaleString()}
                </div>
            </div>`;
            
            document.getElementById('results-container').innerHTML = html;
        }
        
        // Update history
        function updateHistory() {
            let html = '';
            if (queryHistory.length === 0) {
                html = '<div style="color: #999; text-align: center; padding: 20px;">No queries yet</div>';
            } else {
                queryHistory.forEach((item, index) => {
                    const retailIcon = item.is_retail ? '✓' : '⚠️';
                    html += `
                        <div class="history-item">
                            <div class="history-time">${item.timestamp}</div>
                            <div>${item.query}</div>
                            <div style="font-size: 0.8em; color: #999; margin-top: 5px;">${retailIcon} ${item.is_retail ? 'Retail' : 'Non-Retail'}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('history-container').innerHTML = html;
        }
        
        async function fetchDatasetProfile() {
            if (!sessionId) {
                showMessage('results-container', 'error', 'Please upload a dataset first');
                return;
            }
            try {
                const response = await fetch(`${BACKEND_URL}/dataset/profile?session_id=${encodeURIComponent(sessionId)}`);
                if (!response.ok) throw new Error(response.statusText);
                const data = await response.json();
                document.getElementById('results-container').innerHTML = `
                    <div class="result-item"><div class="result-title">🧾 Dataset Profile</div><div class="json-display">${JSON.stringify(data.profile, null, 2)}</div></div>
                `;
            } catch (error) {
                showMessage('results-container', 'error', 'Profile failed: ' + error.message);
            }
        }

        async function fetchCorrelation() {
            if (!sessionId) {
                showMessage('results-container', 'error', 'Please upload a dataset first');
                return;
            }
            try {
                const response = await fetch(`${BACKEND_URL}/dataset/correlation?session_id=${encodeURIComponent(sessionId)}`);
                if (!response.ok) throw new Error(response.statusText);
                const data = await response.json();
                document.getElementById('results-container').innerHTML = `
                    <div class="result-item"><div class="result-title">📈 Correlation Analysis</div><div class="json-display">${JSON.stringify(data.correlations, null, 2)}</div></div>
                `;
            } catch (error) {
                showMessage('results-container', 'error', 'Correlation failed: ' + error.message);
            }
        }

        async function fetchRecommendations() {
            if (!sessionId) {
                showMessage('results-container', 'error', 'Please upload a dataset first');
                return;
            }
            try {
                const response = await fetch(`${BACKEND_URL}/dataset/recommendations?session_id=${encodeURIComponent(sessionId)}`);
                if (!response.ok) throw new Error(response.statusText);
                const data = await response.json();
                document.getElementById('results-container').innerHTML = `
                    <div class="result-item"><div class="result-title">🧪 Data Science Recommendations</div><div class="result-content">${data.recommendations.join('<br>')}</div><div class="json-display">${JSON.stringify(data.key_findings, null, 2)}</div></div>
                `;
            } catch (error) {
                showMessage('results-container', 'error', 'Recommendations failed: ' + error.message);
            }
        }

        async function trainModel() {
            if (!sessionId) {
                showMessage('results-container', 'error', 'Please upload a dataset first');
                return;
            }
            const target = document.getElementById('trainTarget').value.trim();
            const taskType = document.getElementById('trainTaskType').value;
            if (!target) {
                showMessage('results-container', 'error', 'Please provide a target column for training');
                return;
            }
            try {
                const payload = { session_id: sessionId, target_column: target, task_type: taskType, test_size: 0.2 };
                const response = await fetch(`${BACKEND_URL}/dataset/train`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    mode: 'cors'
                });
                if (!response.ok) throw new Error(response.statusText);
                const data = await response.json();
                if (data.status !== 'success') {
                    showMessage('results-container', 'error', 'AutoML failed: ' + (data.error || 'unknown'));
                    return;
                }
                document.getElementById('results-container').innerHTML = `
                    <div class="result-item"><div class="result-title">🤖 AutoML Result</div>
                      <div class="result-content">Best Model: ${data.best_model}, Task Type: ${data.task_type}</div>
                      <div class="json-display">${JSON.stringify(data.metrics, null, 2)}</div>
                      <div class="json-display">Predictions sample: ${JSON.stringify(data.predictions_sample, null, 2)}</div>
                      <div class="json-display">Feature importance: ${JSON.stringify(data.feature_importance, null, 2)}</div>
                    </div>
                `;
            } catch (error) {
                showMessage('results-container', 'error', 'AutoML failed: ' + error.message);
            }
        }

        // Helper functions
        function showMessage(elementId, type, message) {
            const element = document.getElementById(elementId);
            const className = `info-box ${type}`;
            element.innerHTML = `<div class="${className}">${message}</div>`;
        }
        
        function toggleSpinner(elementId, show) {
            document.getElementById(elementId).style.display = show ? 'inline-block' : 'none';
        }
    </script>
</body>
</html>
